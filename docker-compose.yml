name: imagepipeline
services:
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped
    command: mongod --quiet --setParameter logComponentVerbosity='{"accessControl":{"verbosity":-1}}'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: aiimagepipeline
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  server:
    init: true
    build:
      context: ./
      dockerfile: Express Server/Dockerfile
    container_name: express-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    env_file:
      - ./Express Server/.env
    environment:
      - DATABASE_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/aiimagepipeline?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - NOTIFICATION_SERVICE_URL=http://notification:5005
    volumes:
      - ./Express Server:/app/Express Server
      - /app/Express Server/node_modules

  worker:
    init: true
    build:
      context: ./
      dockerfile: Worker System/Dockerfile
    container_name: worker
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - ./Worker System/.env
    environment:
      - DATABASE_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/aiimagepipeline?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/Worker System/ai-image-pipeline.json
    volumes:
      - ./Worker System:/app/Worker System
      - /app/Worker System/node_modules

  notification:
    init: true
    build:
      context: ./
      dockerfile: Email System/Dockerfile
    container_name: notification
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - ./Email System/.env
    environment:
      - DATABASE_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/aiimagepipeline?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./Email System:/app/Email System
      - /app/Email System/node_modules

  frontend:
    init: true
    build:
      context: ./
      dockerfile: Frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    env_file:
      - ./Frontend/.env
    volumes:
      - ./Frontend:/app/Frontend
      - /app/Frontend/node_modules

volumes:
  mongo_data:
  redis_data:
