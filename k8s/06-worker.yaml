apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: imagepipeline
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: your-registry/worker:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: NODE_ENV
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
            - name: MONGO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_ROOT_USER
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_ROOT_PASSWORD
            - name: DATABASE_URL
              value: "mongodb://$(MONGO_ROOT_USER):$(MONGO_ROOT_PASSWORD)@mongo-service:27017/aiimagepipeline?authSource=admin"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: worker-secret
                  key: OPENAI_API_KEY
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_ACCOUNT_ID
            - name: CLOUDFLARE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_ACCOUNT_ID
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_BUCKET_NAME
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/gcp/credentials.json
          volumeMounts:
            - name: gcp-credentials
              mountPath: /etc/gcp
              readOnly: true
          resources:
            requests:
              cpu: 300m
              memory: 256Mi
            limits:
              cpu: 1500m
              memory: 1Gi
      volumes:
        - name: gcp-credentials
          secret:
            secretName: worker-secret
            items:
              - key: GOOGLE_CREDENTIALS_JSON
                path: credentials.json

---
# KEDA ScaledObject: scales worker replicas based on BullMQ Redis queue depth.
# Requires KEDA to be installed in the cluster: https://keda.sh/docs/latest/deploy/
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaledobject
  namespace: imagepipeline
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 60
  triggers:
    - type: redis
      metadata:
        address: redis-service.imagepipeline.svc.cluster.local:6379
        listName: bull:safety-check:wait
        listLength: "5"
      authenticationRef:
        name: keda-redis-auth

---
# TriggerAuthentication: provides KEDA with the Redis password from the secret.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-redis-auth
  namespace: imagepipeline
spec:
  secretTargetRef:
    - parameter: password
      name: redis-secret
      key: REDIS_PASSWORD
