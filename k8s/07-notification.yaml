apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: imagepipeline
  labels:
    app: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: your-registry/notification:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5005
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: NODE_ENV
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
            - name: MONGO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_ROOT_USER
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_ROOT_PASSWORD
            - name: DATABASE_URL
              value: "mongodb://$(MONGO_ROOT_USER):$(MONGO_ROOT_PASSWORD)@mongo-service:27017/aiimagepipeline?authSource=admin"
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: RESEND_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: imagepipeline
  labels:
    app: notification
spec:
  selector:
    app: notification
  ports:
    - port: 5005
      targetPort: 5005
