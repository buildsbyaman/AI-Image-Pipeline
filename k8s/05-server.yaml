apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-server
  namespace: imagepipeline
  labels:
    app: express-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: express-server
  template:
    metadata:
      labels:
        app: express-server
    spec:
      containers:
        - name: express-server
          image: your-registry/express-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: NODE_ENV
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: NOTIFICATION_SERVICE_URL
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
            - name: MONGO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_ROOT_USER
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_ROOT_PASSWORD
            - name: DATABASE_URL
              value: "mongodb://$(MONGO_ROOT_USER):$(MONGO_ROOT_PASSWORD)@mongo-service:27017/aiimagepipeline?authSource=admin"
            - name: ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: ACCESS_TOKEN_SECRET
            - name: REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: REFRESH_TOKEN_SECRET
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_ACCOUNT_ID
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_BUCKET_NAME
            - name: R2_PUBLIC_URL
              valueFrom:
                secretKeyRef:
                  name: server-secret
                  key: R2_PUBLIC_URL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: express-server-service
  namespace: imagepipeline
  labels:
    app: express-server
spec:
  selector:
    app: express-server
  # ClientIP affinity ensures Socket.IO connections are always routed
  # to the same pod (sticky sessions). Works alongside the Redis pub/sub
  # adapter for cross-pod event delivery.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: express-server-hpa
  namespace: imagepipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: express-server
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
